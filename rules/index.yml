# Tier 2: On demand (standards/)
#
# Moved from always_loaded (were in rules/, now in standards/):
#   performance, documentation, context-management, code-review,
#   debugging, agent-usage, github-accounts, gitlab-accounts

on_demand:
  project-glossary:
    path: rules/project-glossary.md
    description: Per-project domain glossary convention. GLOSSARY.md at root for single-context repos, GLOSSARY-INDEX.md plus per-context files for multi-context repos. Lazy creation, one-or-two-sentence definitions, Avoid clauses for rejected synonyms. Loaded by interview-me, tdd, module-audit, zoom-out, onboard.
    triggers: [glossary, "domain glossary", "ubiquitous language", "domain vocabulary", "project glossary", "shared language", "domain terms", "context map", "bounded context"]

  everyday-engineering:
    path: rules/everyday-engineering.md
    description: Daily checklist of engineering principles. Thin-slice before depth, spike to answer one question, orthogonality, reversibility, Law of Demeter, configure-not-integrate, view-model split, feedback loop before hypothesis, prove assumptions, blame-free debugging, regression test on every prod bug, no broken windows, signed work, communication discipline.
    triggers: [engineering, "thin slice", "tracer", spike, orthogonality, reversibility, "law of demeter", "configure not integrate", broken window, "fix the blame", "prove assumption", "saboteur", "state coverage", "find bugs once", "manual procedure", "sign your work", pragmatic]

  engineering-discipline:
