# Rule Index
#
# Two tiers: rules/ (always loaded) and standards/ (loaded on demand).
# Before domain-specific work, match the task against triggers below
# and read the relevant standards/ files.

# ── Tier 1: Always loaded (rules/) ──────────────────────────────────

always_loaded:
  architecture-defaults:
    description: Always-on architectural baseline. Universal principles (DRY, SOLID, KISS, YAGNI, immutability, idempotency, deduplication), five-question architecture gate triggering on-demand standards (DDD when business rules/invariants/state transitions exist, hexagonal when 2+ infra deps exist), hard rules with no exceptions, domain layer contract, idempotency specifics with key/storage/scope/retry, deduplication specifics for queue consumers and webhook receivers, post-implementation verification gate, skip list for trivial scripts
    triggers: [architecture, defaults, ddd, hexagonal, ports, adapters, aggregate, domain, idempotency, deduplication, dedup, immutability, dry, solid, yagni, kiss, service, controller, repository, use case, feature]

  code-style:
    description: DRY/SOLID/KISS, command-query separation, error classification, data safety, defensive invariants, validation, file naming, removal safety, locale-aware components, i18n accents, destructive action confirmation, LLM trust boundary, bisect-friendly commits
    triggers: [style, completeness, fundamentals, "command-query", cqs, "data safety", "delivery path", "defensive invariants", analyzability, validation, zod, dto, "removal safety", "locale-aware", i18n, accent, diacritical, "destructive action", "llm output", "trust boundary", "bisect"]

  design-philosophy:
    description: Ousterhout-derived heuristics for managing complexity. Three manifestations of complexity (change amplification, cognitive load, unknown unknowns), two root causes (dependencies, obscurity), strategic vs tactical programming with 10-20 percent budget, deep modules at module level (defers to existing 30-line function rule), general-purpose modules are deeper, pull complexity downwards, different layer different abstraction, design it twice, define errors out of existence with exception masking and aggregation, red flags catalog (pass-through methods, pass-through variables, configuration parameters, classitis, decorator overuse, getters/setters, adjacent layers same abstraction, temporal decomposition, repeated try/catch), design taste from shipping and feedback
    triggers: [design, complexity, deep module, shallow module, "change amplification", "cognitive load", "unknown unknowns", obscurity, dependencies, "strategic programming", "tactical programming", "design it twice", "pull complexity downwards", "define errors out of existence", "exception masking", "exception aggregation", "pass-through method", "pass-through variable", "configuration parameter", classitis, "temporal decomposition", "design taste", red flag, smell, ousterhout]

  git-workflow:
    description: Conventional commits, branch naming, local quality gate before commit/push, CI monitoring, PR creation, conflict resolution, rollback strategy
    triggers: [git, commit, branch, merge, rebase, ci, pipeline, release, tag, lint, format, build]

  language:
    description: Response language enforcement, all output in English regardless of user input language
    triggers: [language, english, translation, locale]

  pre-flight:
    description: Pre-implementation verification gates for duplicates, architecture fit, interface verification, scope agreement
    triggers: [planning, pre-flight, scope, interface, duplicate, architecture fit]

  repo-analysis:
    description: Clone external repos to a temp directory for analysis instead of fetching files through gh/GitLab APIs. Forbids per-file API reads when more than two source files are needed, defines a mandatory mktemp + shallow-clone workflow, lists carve-outs (issues, PRs, single README probe, cross-repo search), and briefs subagents to use Read/Grep/Glob against the clone path
    triggers: [repo analysis, repository analysis, clone, external repo, gh api contents, raw.githubusercontent, fetch files, read repo, analyze repository, third-party repo, reference repo]

  surgical-edits:
    description: Every changed line traces to the user's request, no adjacent improvements, cleanup boundaries for orphan removal, diff self-test
    triggers: [edit, surgical, diff, refactor, cleanup, scope creep, adjacent, orphan, dead code]

  security:
    description: Secrets management, auth checklist, encryption, data privacy, audit logging, supply chain security
    triggers: [security, auth, encryption, secret, password, token, csrf, xss, injection, owasp, certificate, ssl, tls, pentest, penetration, exploit, vulnerability, ssrf, idor, xxe, ssti, rce]

  smart-questions:
    description: Question and report quality across all dialogue directions, self-investigation gate, XY-aware framing, one blocking question format, mandatory recommendation when presenting a choice, ship the question, symptom-first status reports, Tatham bug-report essentials, subagent briefing requirements, FIXED/RESOLVED/DONE loop closure
    triggers: [question, ask, asking, clarify, clarification, ambiguous, ambiguity, "xy problem", "xy framing", "ship the question", "no hello", "meta question", "bug report", antelope, fingerprint, symptom, "status update", "error report", reproduction, "fixed tag", "resolved tag", "loop closure", "subagent prompt", "agent brief", "object deviation", recommendation, "recommend an option", "which do you recommend", "option trade-off", "pick an option", choice, options]

  testing:
    description: Integration-first philosophy, strict mock policy, AAA pattern, fake data generators, deterministic tests, snapshot guidelines
    triggers: [test, testing, unit, unit test, mock, coverage, jest, vitest, pytest, fixture, snapshot, e2e]

  verification:
    description: Evidence-based completion gates, fresh output required for every claim, no rounding up partial completion
    triggers: [verify, evidence, complete, done, claim, proof, gate]

  writing-precision:
    description: Precision gate for all text output, concrete over abstract, examples over vague instructions, self-test before finalizing
    triggers: [write, writing, text, prose, message, comment, description, rule, standard, precision, pr description, code comment, error message]

  normative-keywords:
    description: BCP 14 (RFC 2119 + RFC 8174) normative keyword vocabulary for rules, standards, skills, agents, and READMEs. Glossary for must, must not, should, should not, may, never, always with equivalent forms. Lowercase is the default register. Uppercase is opt-in for genuinely critical security, correctness, data-integrity, and irreversibility statements. Single-citation model avoids per-file RFC boilerplate. Composes with writing-precision.md "Eliminate weasel words"
    triggers: [must, "must not", should, "should not", shall, may, required, recommended, optional, never, always, normative, keyword, "normative keyword", bcp, "bcp 14", "rfc 2119", "rfc 8174", weasel, obligation, requirement]

  compliance-defaults:
    description: Master umbrella rule for ten frontend compliance domains. Strictest-applicable-rule-wins policy. Existing-but-not-yet-mandatory rules count as mandatory. Loads accessibility, privacy, cookies, cybersecurity, consumer protection by default. Children, AI, anti-spam, sectoral, topical load on keyword. Locked targets table (WCAG 2.2 AA + AAA, GDPR-grade privacy, opt-in cookies, NIST password, 44x44 target size, 7:1 contrast, 14-day withdrawal, AI disclosure, 72h breach notification).
    triggers: [compliance, frontend, ui, component, form, modal, dialog, page, button, navigation, table, autocomplete, chart, image, video, icon, link, layout, theme]

  accessibility-defaults:
    description: WCAG 2.2 AA mandatory + AAA aspirational. Forbidden patterns list (img without alt, input without label, role on div without keyboard, tabindex > 0, missing lang, color-only meaning, image CAPTCHA). Mechanical hook accessibility-mechanical-checks.py.
    triggers: [accessibility, a11y, wcag, aria, axe, axe-core, jest-axe, playwright-axe, cypress-axe, lighthouse, pa11y, screen reader, voiceover, nvda, talkback, focus management, contrast, keyboard navigation, alt text, label, semantic html]

  privacy-defaults:
    description: GDPR-grade privacy by default across all jurisdictions. Lawful basis, opt-in consent, 30-day DSAR, 72h breach notification, 24-month retention default, DPO designation, DPIA triggers, SCCs/BCRs for transfers, sensitive data union, ADM right to explanation. Forbidden patterns (soft delete for erasure, bundled consent, pre-ticked boxes, PII in logs/URLs).
    triggers: [privacy, personal data, gdpr, lgpd, ccpa, cpra, pipeda, lfpdpp, dsar, dpia, dpo, consent, retention, erasure, breach notification, pseudonymization, sensitive data, anonymization, lawful basis, data subject, data minimization, signup, "sign up", "sign-up", registration, register, "create account", "user account", profile, "user data", contact form]

  cookie-discipline:
    description: ePrivacy + EDPB cookie rules. Opt-in default, reject-all parity with accept-all, granular categories, no pre-ticked boxes, no cookie walls, one-click withdrawal, banner accessibility (aria-modal, focus trap, ESC), consent record, CCPA Do Not Sell or Share link.
    triggers: [cookie, cookies, eprivacy, banner, consent banner, gtm, google analytics, tracking pixel, localstorage, sessionstorage, indexeddb, "do not sell", "do not share"]

  cybersecurity-baseline:
    description: Frontend cybersecurity defaults. TLS 1.3, HSTS preload, nonce-based CSP, HttpOnly+Secure+SameSite cookies, NIST password policy, MFA mandate, session timeout matrix, rate limits, breach notification timeline matrix (GDPR 72h, SEC 4 business days, HIPAA 60d, state 30-90d, NIS2 24h+72h, ANPD 2 business days), SRI, open redirect prevention, SSRF prevention.
    triggers: [cybersecurity, security baseline, nis2, dora, breach notification, csp, hsts, subresource integrity, sri, ssrf, open redirect, ratelimit, "rate limit", session timeout]

  consumer-defaults:
    description: EU Consumer Rights + Omnibus + Brazil CDC + FTC consumer protection. 14-day withdrawal, pre-contractual info, price transparency, auto-renewal disclosure, Click-to-Cancel, fake-review prohibition, dark pattern ban, Decreto 7.962 e-commerce specifics, refund window.
    triggers: [consumer, e-commerce, ecommerce, checkout, purchase, subscription, withdrawal, refund, "free trial", auto-renewal, dark pattern, dark-pattern, "fake review", review platform, price, tax, shipping, "click to cancel"]

  children-privacy-defaults:
    description: COPPA + GDPR Art. 8 + UK Children's Code + California AADC + LGPD Art. 14. Default consent age 18 for profiling/ads, 16 for accounts, 13 minimum with verifiable parental consent under 13. High-privacy by default for under-18. No behavioral profiling. No nudge techniques. No streak counts. Geolocation off by default. Parental controls. Age threshold matrix per jurisdiction.
    triggers: [child, children, kid, kids, minor, minors, "under 18", "under 16", "under 13", coppa, aadc, "age appropriate design code", "children's code", "parental consent", "age gate", "age verification", family, educational, gaming, ECA]

  ai-compliance-defaults:
    description: EU AI Act + Colorado AI Act + NYC LL 144 + California SB 942 + California AB 2013 + AIDA + Brazil PL 2338. Risk tier classification, Article 5 prohibitions (Feb 2025), GPAI obligations (Aug 2025), high-risk obligations (Aug 2026), disclosure tag on model output, chatbot self-identification, deepfake watermark, ADM right to explanation, annual bias audit, training data transparency. Mechanical hook ai-disclosure-checks.py.
    triggers: [ai, llm, chatbot, recommender, ranking, generative, gpt, claude, anthropic, openai, deepfake, "automated decision", "model output", "ml model", "ai act", "bias audit", "algorithmic discrimination", "high-risk ai", gpai]

  anti-spam-defaults:
    description: CAN-SPAM + CASL + ePrivacy + LGPD marketing rules. Opt-in default everywhere, one-click unsubscribe, List-Unsubscribe header, identity disclosure (legal name + physical address), accurate subject lines, transactional vs marketing distinction, suppression list, frequency cap, CASL express vs implied consent, Brazil LGPD soft opt-in conditions.
    triggers: [spam, "anti-spam", "anti spam", marketing, newsletter, broadcast, "push notification", email campaign, sms, unsubscribe, "list-unsubscribe", "can-spam", casl, transactional, opt-in, opt-out]

  markdown-links:
    description: Every file mention in published markdown is a clickable link to the actual file. Two acceptable forms, exception zones, validator and hook integration, skip-list for test fixtures and command examples
    triggers: [markdown, md, documentation, readme, link, file reference, file mention, bare path, backlink, doc link]

  ai-guardrails:
    description: Treat AI output as junior dev code, review every generation, track AI-specific defect patterns, never commit unexplainable code
    triggers: [ai, guardrail, generation, hallucination, ai code, review, defect, junior]

  no-ai-process-leak:
    description: Block phase-N markers, planning-doc references, project planning-folder paths, canvas-region mappings, casual ADR-NNN references, and hyperbole tells (state-of-the-art, 100% faithful) in commit messages, PR descriptions, code comments, and other human-facing artifacts. Enforced by ai-process-leak-blocker.py hook with AI_PROCESS_LEAK_DISABLE parent-shell bypass for editing planning artifacts
    triggers: [ai process leak, process leak, phase, plan reference, canvas region, hyperbole, state-of-the-art, faithful, planning artifact, commit message leak, pr description leak]

  memory-supersede:
    description: Supersede-not-delete chain for project and feedback memories, frontmatter pointers, chain depth limit, reference memories may be deleted
    triggers: [memory, supersede, supersedes, superseded_by, auto-memory, memory chain, memory update, memory archive]

  found-fix:
    description: A problem surfaced by any verification surface (CI annotations, deprecations, linter warnings, security advisories, hook blockers, broken docs links) is in scope for the current task regardless of when it was introduced. Bans the "pre-existing", "not introduced by my change", "orthogonal", "out of scope" rationalizations in commit messages, PR descriptions, and code comments. Enforced by hooks/found-fix-rationalization-blocker.py with FOUND_FIX_RATIONALIZATION_DISABLE parent-shell bypass for writing about the rule itself
    triggers: [found-fix, "pre-existing", "not introduced", "orthogonal", "leave for later", "out of scope", deprecation, annotation, "verification gate", "broken windows"]

  living-specs:
    description: Maintain a living, testable statement of current behavior for non-trivial changes. specs/current/ organized by domain, requirements with normative keywords, Given/When/Then scenarios, delta discipline (ADDED/MODIFIED/REMOVED) against the current spec, and a close-out merge owned by /plan archive and reachable from /ship and /retro. Trivial changes skip per the surgical-edits skip list. Distinct from dated plan folders which record why; living specs record what
    triggers: [living spec, "living specs", behavioral spec, source of truth, requirement, scenario, "given/when/then", delta spec, "specs/current", archive spec, close-out merge, spec-driven]


# Tier 1b: Language-specific (rules/lang/)
#
# Loaded when the active task names a specific language. Per-language
# guidance lives here; cross-language standards live under standards/.

lang:
  _placeholder:
    path: rules/lang/README.md
    description: Index for language-specific rules. Populated as new entries arrive.
    triggers: [lang readme, language rules index]

  orm-migrations:
    path: rules/lang/orm-migrations.md
    description: "Consolidated ORM migrations rule covering Prisma, TypeORM, Drizzle, Sequelize, and MikroORM. Cross-cutting principles (schema-vs-migration parity, schema sync strategy hierarchy with push/sync banned outside dev, idempotent DDL with IF NOT EXISTS, explicit index names, transactional migrations, migration ordering, down-migration semantics, service-layer boundary, no raw SQL from app code, API boundary DTOs, schema completeness with createdAt/updatedAt/deletedAt/companyId/FK indexes, unmanaged objects). Per-ORM sections show exact syntax for parity, index naming, schema completeness, verification (migrate diff, probe migration, drizzle-kit generate, mikro-orm migration:create --dry-run), down migrations, transactions, and raw-query escape hatches. MikroORM-specific: Data Mapper plus Unit of Work, entity discovery via entities and entitiesTs, @mikro-orm/migrations Migrator extension, transactional and allOrNothing wrappers, schema:fresh banned outside dev, EntityManager.fork() per request, soft-delete via @Filter decorator"
