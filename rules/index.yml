    triggers: [review, pr, pull request, code review, adr, tech debt, external output, config leakage, open pr, create pr, submit pr, merge pr, approve, respond, reply, address comments, incoming review, handle review, reviewer comments, pr feedback, reviewee, conventional comments, ptal, lgtm, nit]

