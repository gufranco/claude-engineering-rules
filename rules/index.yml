    description: Deep reference of daily-engineering principles drawn from Hunt and Thomas. End-to-end thin slice, prototype-to-learn, orthogonality, reversibility, critical reading, communication, estimating to learn, fix-the-problem-not-the-blame, prove-every-assumption, Law of Demeter, configure-not-integrate, services with explicit concurrency, view-model split, refactor as gardening, design for test, dig for requirements, find the box, broken windows, no manual procedures, find bugs once, build documentation in.
    triggers: [engineering, discipline, "pragmatic programmer", hunt, thomas, "thin slice", "tracer bullet", orthogonality, reversibility, "law of demeter", "saboteur", "state coverage", "manual procedure", "broken window", "knowledge portfolio", "design for test", "wizard code", "dig for requirements", "find the box"]

  software-complexity:
