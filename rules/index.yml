               prisma, schema.prisma, "@@index", "@@unique", "prisma migrate", "migrate diff", "migrate dev", "migrate deploy",
               typeorm, "type-orm", "@Entity", "@Column", "@Index", "@Unique", "@Check", "@CreateDateColumn", "@UpdateDateColumn", "@DeleteDateColumn", "@ManyToOne", "@OneToMany", "data-source", "DataSource", "EntityManager", "QueryRunner", "migration:generate", "migration:run", "migration:revert", "migration:show", synchronize, "naming strategy", "NamingStrategy", "createQueryBuilder", "Repository", "InjectRepository",
               drizzle, "drizzle-orm", "drizzle-kit", "drizzle-kit push", "drizzle-kit generate", "drizzle-kit migrate", "drizzle-kit pull", "drizzle-kit drop", pgTable, mysqlTable, sqliteTable, "defineRelations", "uniqueIndex", "$onUpdateFn", "$onUpdate", "defaultNow", "drizzle.config", "__drizzle_migrations", "_meta/_journal",
               sequelize, "sequelize-cli", "sequelize-typescript", umzug, "Model.init", "sequelize.define", "queryInterface", "addColumn", "removeColumn", "addIndex", "removeIndex", "createTable", "dropTable", "belongsTo", "hasMany", "hasOne", "belongsToMany", paranoid, "SequelizeStorage", "sync({ force", "sync({ alter", "DataTypes",
               "mikro-orm", "@mikro-orm/core", "@mikro-orm/migrations", "@mikro-orm/postgresql", "@mikro-orm/mysql", "@mikro-orm/sqlite", "@mikro-orm/mongodb", "MikroORM.init", entities, entitiesTs, "schema:fresh", "schema:update", "schema:create", "migration:create", "migration:up", "migration:down", Migrator, "Data Mapper", "Unit of Work", "@Filter", "@Property", "@PrimaryKey", "@Entity", RequestContext, "em.fork", "em.persistAndFlush"]

