# Rule Index
#
# Two tiers: rules/ (always loaded) and standards/ (loaded on demand).
# Before domain-specific work, match the task against triggers below
# and read the relevant standards/ files.

# ── Tier 1: Always loaded (rules/) ──────────────────────────────────

always_loaded:
  code-style:
    description: DRY/SOLID/KISS, command-query separation, error classification, data safety, defensive invariants, validation, file naming, removal safety, locale-aware components, i18n accents, destructive action confirmation, LLM trust boundary, bisect-friendly commits. TypeScript-specific guidance moved to rules/lang/typescript-types.md, rules/lang/typescript-immutability.md, and rules/lang/typescript-strict.md
    triggers: [style, completeness, fundamentals, "command-query", cqs, "data safety", "delivery path", "defensive invariants", analyzability, validation, zod, dto, "removal safety", "locale-aware", i18n, accent, diacritical, "destructive action", "llm output", "trust boundary", "bisect"]


  git-workflow:
    description: Conventional commits, branch naming, local quality gate before commit/push, CI monitoring, PR creation, conflict resolution, rollback strategy
    triggers: [git, commit, branch, merge, rebase, ci, pipeline, release, tag, lint, format, build]

  language:
    description: Response language enforcement, all output in English regardless of user input language
    triggers: [language, english, translation, locale]

  pre-flight:
    description: Pre-implementation verification gates for duplicates, architecture fit, interface verification, scope agreement
    triggers: [planning, pre-flight, scope, interface, duplicate, architecture fit]

  surgical-edits:
    description: Every changed line traces to the user's request, no adjacent improvements, cleanup boundaries for orphan removal, diff self-test
    triggers: [edit, surgical, diff, refactor, cleanup, scope creep, adjacent, orphan, dead code]

  security:
    description: Secrets management, auth checklist, encryption, data privacy, audit logging, supply chain security
    triggers: [security, auth, encryption, secret, password, token, csrf, xss, injection, owasp, certificate, ssl, tls, pentest, penetration, exploit, vulnerability, ssrf, idor, xxe, ssti, rce]

  smart-questions:
    description: Question and report quality across all dialogue directions, self-investigation gate, XY-aware framing, one blocking question format, ship the question, symptom-first status reports, Tatham bug-report essentials, subagent briefing requirements, FIXED/RESOLVED/DONE loop closure
    triggers: [question, ask, asking, clarify, clarification, ambiguous, ambiguity, "xy problem", "xy framing", "ship the question", "no hello", "meta question", "bug report", antelope, fingerprint, symptom, "status update", "error report", reproduction, "fixed tag", "resolved tag", "loop closure", "subagent prompt", "agent brief", "object deviation"]

  testing:
    description: Integration-first philosophy, strict mock policy, AAA pattern, fake data generators, deterministic tests, snapshot guidelines
    triggers: [test, testing, unit, unit test, mock, coverage, jest, vitest, pytest, fixture, snapshot, e2e]

  verification:
    description: Evidence-based completion gates, fresh output required for every claim, no rounding up partial completion
    triggers: [verify, evidence, complete, done, claim, proof, gate]

  writing-precision:
    description: Precision gate for all text output, concrete over abstract, examples over vague instructions, self-test before finalizing
    triggers: [write, writing, text, prose, message, comment, description, rule, standard, precision, pr description, code comment, error message]

  ai-guardrails:
    description: Treat AI output as junior dev code, review every generation, track AI-specific defect patterns, never commit unexplainable code
    triggers: [ai, guardrail, generation, hallucination, ai code, review, defect, junior]

  memory-supersede:
    description: Supersede-not-delete chain for project and feedback memories, frontmatter pointers, chain depth limit, reference memories may be deleted
    triggers: [memory, supersede, supersedes, superseded_by, auto-memory, memory chain, memory update, memory archive]


# Tier 1b: Language-specific (rules/lang/)
#
# Loaded when the active task names a specific language. New language
# guidance goes here; existing flat language standards remain in standards/
# until superseded by entries in this subdir.

lang:
  _placeholder:
    path: rules/lang/README.md
    description: Index for language-specific rules. Populated as new entries arrive.
    triggers: [lang readme, language rules index]

  prisma-migrations:
    path: rules/lang/prisma-migrations.md
    description: Schema-vs-migration parity, index naming convention via map, prisma migrate diff verification, unmanaged-object bypass, schema completeness (createdAt, updatedAt, companyId indexes, FK indexes)
    triggers: [prisma, migration, migrations, schema.prisma, "@@index", "@@unique", "prisma migrate", "migrate diff", "migrate dev", "migrate deploy", drift, schema drift, createdAt, updatedAt, companyId]

  typeorm-migrations:
    path: rules/lang/typeorm-migrations.md
    description: Entity-vs-migration parity for TypeORM, synchronize disabled outside local dev, explicit names on @Index/@Unique/@Check, down migration semantics, transactional DDL, no raw .query() in app code, schema completeness (@CreateDateColumn, @UpdateDateColumn, @DeleteDateColumn, FK indexes, companyId indexes)
    triggers: [typeorm, "type-orm", "@Entity", "@Column", "@Index", "@Unique", "@Check", "@CreateDateColumn", "@UpdateDateColumn", "@DeleteDateColumn", "@ManyToOne", "@OneToMany", "data-source", "DataSource", "EntityManager", "QueryRunner", "migration:generate", "migration:run", "migration:revert", "migration:show", synchronize, "naming strategy", "NamingStrategy", "createQueryBuilder", "Repository", "InjectRepository"]

  drizzle-migrations:
    path: rules/lang/drizzle-migrations.md
    description: Schema-vs-migration parity for Drizzle, drizzle-kit push banned outside local dev, explicit names on index() and uniqueIndex(), no built-in down migrations (reverse via new migration), no raw sql template in app code, schema completeness (created_at, updated_at via $onUpdateFn, FK indexes, identity columns over serial)
    triggers: [drizzle, "drizzle-orm", "drizzle-kit", "drizzle-kit push", "drizzle-kit generate", "drizzle-kit migrate", "drizzle-kit pull", "drizzle-kit drop", pgTable, mysqlTable, sqliteTable, "defineRelations", "uniqueIndex", "$onUpdateFn", "$onUpdate", "defaultNow", "drizzle.config", "__drizzle_migrations", "_meta/_journal", "sql.raw", "db.execute", "db.run"]

  sequelize-migrations:
    path: rules/lang/sequelize-migrations.md
    description: "Model-vs-migration parity for Sequelize, sync({ force/alter: true }) banned outside test fixtures, explicit name on every indexes entry, transactional migrations with queryInterface, paranoid soft delete, umzug storage configuration, no raw .query() in app code, schema completeness (timestamps, companyId indexes, FK indexes)"
    triggers: [sequelize, "sequelize-cli", "sequelize-typescript", umzug, "Model.init", "sequelize.define", "queryInterface", "addColumn", "removeColumn", "addIndex", "removeIndex", "createTable", "dropTable", "belongsTo", "hasMany", "hasOne", "belongsToMany", paranoid, "SequelizeStorage", "sync({ force", "sync({ alter", "DataTypes"]

  typescript-types:
    path: rules/lang/typescript-types.md
    description: TypeScript type construct selection (interface vs type vs enum), discriminated unions with exhaustive matching, branded types for nominal typing, type state pattern for state machine transitions
    triggers: [typescript, ts, tsx, type, interface, enum, brand, branded, discriminated, "discriminated union", "type state", "as const", "satisfies never", nominal, "ts-pattern"]

  typescript-immutability:
    path: rules/lang/typescript-immutability.md
    description: Immutability rule for TypeScript (no push/pop/sort/splice, readonly ladder), mutation surface covered by mutation-method-blocker hook, DOM/Web API stance, withdrawn Records and Tuples proposal, ES2024+ non-mutating replacements (toSorted, toReversed, with, Set composition, iterator helpers, Object.groupBy), auto-allowed scopes, CI SARIF snippets, Date and Time handling with Temporal
    triggers: [typescript, ts, tsx, immutable, immutability, mutation, mutating, mutability, readonly, freeze, splice, reverse, pop, shift, unshift, fill, copywithin, "map.set", "set.add", "object.assign", defineproperty, setprototypeof, delete, valtio, jotai, recoil, xstate, solid, nanostores, legendapp, tanstack, "effect-ts", temporal, composites, sarif, lsp, "language server", "vscode-extension", "jetbrains-plugin", "eslint-plugin", "pre-commit", husky, lefthook, biome, "toSorted", "toReversed", "toSpliced", "with", "groupBy", "Object.groupBy", "Map.groupBy", "structuredClone", "Records and Tuples", "@js-temporal", date, "date-fns", instant, plaindate, plaindatetime, zoneddatetime, duration, "url-search-params", urlsearchparams, headers, formdata, angular, "angular-signals", qwik, "qwik-signals", preact, "preact-signals", useformstate, useactionstate, useoptimistic, usereducer, usesyncexternalstore, "use server", "react server actions", "tc39-signals", "signal-polyfill", "effect-ref", "fp-ts", pipe, flow, "asynciterator", "async iterator", "iterator helpers", "for-await-push", "Array.fromAsync", "Promise.try", "Promise.withResolvers", "RegExp.escape", "Error.isError", "Atomics.pause", "Float16Array", "Uint8Array.fromBase64", "Uint8Array.fromHex", "pipeline-operator", "iterator.range", dataview, atomics, sharedarraybuffer, webassembly, wasm, "WebAssembly.Memory.grow", "WebAssembly.Memory.prototype.grow", "private field", "private-field", "#field", "symbol key", "symbol-key", "static block", "static-block", "static-initializer", proxy, "proxy trap", weakref, "weakref-deref", finalizationregistry, codemod, ts-morph, "whole-program", confidence, otel, "audit-log", "perf-budget", allowlist, "fix-suggestion", suppression, "claude-allow-mutation"]

  typescript-strict:
    path: rules/lang/typescript-strict.md
    description: TypeScript compiler strictness (noUncheckedIndexedAccess, exactOptionalPropertyTypes, verbatimModuleSyntax), target/module settings to match runtime, TypeScript 5.x patterns (using/await using, NoInfer, Symbol.dispose)
    triggers: [typescript, ts, tsxconfig, tsconfig, strict, compiler, strictness, "noUncheckedIndexedAccess", "exactOptionalPropertyTypes", "verbatimModuleSyntax", "noPropertyAccessFromIndexSignature", "noFallthroughCasesInSwitch", target, module, moduleResolution, "@tsconfig/node", using, "await using", "Symbol.dispose", "Symbol.asyncDispose", NoInfer, "ts 5", "typescript 5"]

# Tier 2: On demand (standards/)
#
# Moved from always_loaded (were in rules/, now in standards/):
#   performance, documentation, context-management, code-review,
#   debugging, agent-usage, github-accounts, gitlab-accounts

on_demand:
  performance:
    path: standards/performance.md
    description: Core Web Vitals budgets, API latency targets, database query limits, JS and CSS bundle budgets, image optimization, DOM rendering rules
    triggers: [performance, lcp, inp, cls, core web vitals, bundle size, latency, p50, p95, p99, image, dom, reflow, lighthouse, bundle, frontend perf]

  documentation:
    path: standards/documentation.md
    description: Preserve existing valid information when skills or automated processes modify documentation files. Merge, do not replace. Count items before and after migration.
    triggers: [readme, docs, documentation, changelog, guide, skill output, merge docs, update readme, modify docs]

  ai-vocabulary:
    path: standards/ai-vocabulary.md
    description: Canonical glossary for AI coding terminology. Tokens, context windows, hallucination, sycophancy, handoffs, supersede chains. Use to prevent synonym drift across PRs, ADRs, and rule files.
