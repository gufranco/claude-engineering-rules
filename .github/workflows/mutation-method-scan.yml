name: Mutation method scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  scan:
    name: Mutation scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Make hook executable
        run: chmod +x hooks/mutation-method-blocker.py

      - name: Collect changed JS/TS files
        id: collect
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            base="origin/${{ github.base_ref }}"
            git diff --name-only --diff-filter=AM "$base"...HEAD \
              | grep -E '\.(ts|tsx|js|jsx|mjs|cjs)$' \
              > scan-targets.txt || true
          else
            git ls-files \
              | grep -E '\.(ts|tsx|js|jsx|mjs|cjs)$' \
              > scan-targets.txt || true
          fi
          count=$(wc -l < scan-targets.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Will scan $count file(s)"

      - name: Run mutation-method-blocker
        if: steps.collect.outputs.count != '0'
        env:
          MUTATION_METHOD_BATCH_MODE: "1"
        run: |
          python3 hooks/mutation-method-blocker.py < scan-targets.txt || true
