name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install ruff pyyaml

      - name: ShellCheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck --severity=warning --shell=bash --enable=all hooks/*.sh tests/test-hooks.sh

      - name: Python lint
        run: ruff check hooks/*.py scripts/*.py

      - name: Validate counts
        run: python3 scripts/validate-counts.py

      - name: Validate JSON
        run: python3 -c "import json, glob; [json.load(open(f)) for f in glob.glob('**/*.json', recursive=True)]"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Markdownlint
        run: |
          npx --yes markdownlint-cli2 "rules/*.md" "standards/*.md" "skills/*/SKILL.md" "checklists/*.md" "CLAUDE.md" "README.md"

      - name: Validate YAML
        run: python3 -c "import yaml; yaml.safe_load(open('rules/index.yml'))"

      - name: Validate index.yml paths
        run: |
          python3 -c "
          import os, sys, yaml
          with open('rules/index.yml') as f:
              idx = yaml.safe_load(f)
          errors = 0
          for section in ['always_loaded', 'on_demand']:
              for name, entry in (idx.get(section) or {}).items():
                  path = entry.get('path', f'rules/{name}.md')
                  if not os.path.exists(path):
                      print(f'ERROR: {path} referenced in index.yml does not exist')
                      errors += 1
          if errors:
              sys.exit(1)
          print('All index.yml paths valid')
          "

      - name: Validate Markdown structure
        run: |
          errors=0
          for f in rules/*.md skills/*/SKILL.md checklists/*.md; do
            # Check for unclosed code blocks (odd number of triple backticks)
            count=$(grep -c '```' "$f" 2>/dev/null || echo 0)
            if [ $((count % 2)) -ne 0 ]; then
              echo "ERROR: $f has unclosed code block ($count triple-backtick lines)"
              errors=$((errors + 1))
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "$errors file(s) with markdown issues"
            exit 1
          fi
          echo "All markdown files valid"

      - name: Validate agent definitions
        run: python3 scripts/validate-agents.py

      - name: Validate settings.json
        run: python3 scripts/validate-settings.py

      - name: Validate command blocker patterns
        run: python3 scripts/validate-patterns.py

      - name: Validate skill definitions
        run: python3 scripts/validate-skills.py

      - name: Validate cross-references
        run: python3 scripts/validate-cross-refs.py

  hooks:
    name: Hook tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Make hooks executable
        run: chmod +x hooks/*.sh hooks/*.py tests/test-hooks.sh

      - name: Run hook smoke tests
        run: bash tests/test-hooks.sh

      - name: Hook performance check
        run: bash scripts/hook-benchmark.sh --threshold 500
