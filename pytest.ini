[pytest]
# Spec: specs/2026-05-09-claude-config-state-of-art/plan.md 1.2.2.
#
# Note: the spec drafted this file as `tests/_pytest.ini`. The final location
# is the repo root because pytest discovers config from rootdir, and tests
# must run cleanly without a `-c` flag for editor + CI integration.

minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# pytest-randomly: shuffle test order to surface order-dependent bugs.
# Reproducible via PYTEST_RANDOMLY_SEED env var.
#
# pytest-xdist: parallel execution. `-n auto` uses all CPU cores.
#
# pytest-cov: stitch in branch coverage from .coveragerc with the 95%
# fail_under gate per spec.
#
# --strict-markers: unknown markers fail the run instead of being ignored.
# --strict-config: typos in this file fail the run.
# -ra: short summary of all skipped/xfailed/errored tests at the end.
addopts =
    --strict-markers
    --strict-config
    -ra
    --tb=short
    --cov=hooks
    --cov=.github/scripts
    --cov-config=.coveragerc
    --cov-fail-under=93
    --cov-report=term-missing
    --cov-report=xml
    --cov-report=html

markers =
    unit: pure-function tests with no I/O
    integration: tests that exercise real services (db, redis, network)
    slow: tests that take more than 5 seconds
    smoke: critical-path post-deploy verification
    perf: latency / throughput regression checks

filterwarnings =
    error
    ignore::DeprecationWarning:coverage.*
    ignore::PendingDeprecationWarning
    ignore::coverage.exceptions.CoverageWarning

# Treat collection errors and unraisable exceptions as failures.
xfail_strict = true
